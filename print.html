<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>


  <meta charset="UTF-8">
  <title>Invoice</title>

<style>
  @page {
    size: A4;
  margin: 12mm 12mm 28mm 12mm;
  }

  * {
    box-sizing: border-box;
  }

  body {
    direction: rtl;
    margin: 0;
    font-family: Arial, Tahoma, sans-serif;
    color: #111827;
    background: #ffffff;
  }

  .invoice {
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
    padding: 22px;
  }

.header {
  text-align: center;
  padding-bottom: 18px;
  margin-bottom: 18px;
  border-bottom: 1px solid #e5e7eb;
}

.header img {
  width: 74px;
  height: 74px;
  object-fit: contain;
  display: block;
  margin: 0 auto 8px;
}

.header h2 {
  margin: 0;
  font-size: 25px;
  font-weight: 800;
  color: #111827;
}
.summary-wrap,
.totals {
  break-inside: avoid;
  page-break-inside: avoid;
}
.items-table tr {
  break-inside: avoid;
  page-break-inside: avoid;
}
.items-table thead {
  display: table-header-group;
}
.items-table td,
.items-table th {
  break-inside: avoid;
  page-break-inside: avoid;
}

.items-table tfoot {
  display: table-footer-group;
}
.print-footer {
  margin-top: 24px;
  padding-top: 10px;
  text-align: center;
  font-size: 12px;
  color: #6b7280;
  border-top: 1px solid #e5e7eb;
  break-inside: avoid;
  page-break-inside: avoid;
}

.store-address {
  margin-top: 6px;
  font-size: 13px;
  color: #6b7280;
  font-weight: 400;
}


  .store-title {
    text-align: center;
  }

  .store-title h2 {
    margin: 0;
    font-size: 25px;
    font-weight: 800;
    color: #111827;
  }

  .invoice-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }

  .meta-card {
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 10px 12px;
    background: #fafafa;
    min-height: 58px;
  }

  .meta-card .label {
    display: block;
    font-size: 11px;
    color: #6b7280;
    margin-bottom: 5px;
  }

  .meta-card .value {
    display: block;
    font-size: 14px;
    color: #111827;
    font-weight: 700;
  }

  .items-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    overflow: hidden;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    font-size: 14px;
  }

  .items-table thead th {
    background: #f3f4f6;
    color: #374151;
    font-size: 12px;
    font-weight: 800;
    padding: 11px 10px;
    border-bottom: 1px solid #e5e7eb;
  }

  .items-table tbody td {
    padding: 12px 10px;
    text-align: center;
    border-bottom: 1px solid #f0f0f0;
  }

  .items-table tbody tr:last-child td {
    border-bottom: none;
  }

  .items-table tbody tr:nth-child(even) {
    background: #fbfbfb;
  }

  .items-table td:first-child,
  .items-table th:first-child {
    text-align: right;
  }

.summary-wrap {
  margin-top: 18px;
  width: 100%;
}

.totals {
  width: 100%;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  overflow: hidden;
  background: #ffffff;
}

.totals div {
  display: flex;
  justify-content: space-between;
  padding: 11px 14px;
  font-size: 14px;
  border-bottom: 1px solid #f1f1f1;
   font-weight: 700;
}

.totals div:last-child {
  border-bottom: none;
}


  .totals span:first-child {
    color: #6b7280;
  }

  .totals span:last-child {
    font-weight: 800;
    color: #111827;
  }

  .total-line {
    background: #111827;
    color: #ffffff;
      font-weight: 900;

  }

  .total-line span:first-child,
  .total-line span:last-child {
    color: #ffffff;
  }

  .remaining span:last-child {
    color: #b91c1c;
  }

@media print {
  body {
    background: #ffffff;
  }

  .invoice {
    max-width: 820px;
    margin: 0 auto;
    padding: 22px;
  }

  .meta-card,
  .items-table,
  .totals,
  .print-footer {
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }

  .invoice,
  table,
  .items-table,
  .items-table tbody {
    break-inside: auto;
    page-break-inside: auto;
  }

  .items-table thead {
    display: table-header-group;
  }

  .items-table tr {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .summary-wrap,
  .totals,
  .print-footer {
    break-inside: avoid;
    page-break-inside: avoid;
  }
  
}
* {
  print-color-adjust: exact;
  -webkit-print-color-adjust: exact;
}
</style>


</head>

<body>
<div class="invoice">

<div class="header">
  <img id="logo" alt="Logo">

  <h2 id="storeName"></h2>
  <div id="storeAddress" class="store-address"></div>
</div>




<div class="invoice-meta">
  <div class="meta-card">
    <span class="label">العميل</span>
    <span class="value" id="client"></span>
  </div>

  <div class="meta-card">
    <span class="label">طريقة الدفع</span>
    <span class="value" id="payment"></span>
  </div>

  <div class="meta-card">
    <span class="label">رقم الفاتورة</span>
    <span class="value" id="invoiceNo"></span>
  </div>

  <div class="meta-card">
    <span class="label">التاريخ</span>
    <span class="value" id="date"></span>
  </div>
</div>



<table class="items-table">
    <thead>
      <tr>
        <th>الصنف</th>
        <th>الكمية</th>
        <th>السعر</th>
        <th>المجموع</th>
      </tr>
    </thead>
    <tbody id="items"></tbody>
  </table>

<div class="summary-wrap">
  <div class="totals">
    <div>
      <span>المجموع</span>
      <span id="subtotal"></span>
    </div>

    <div>
      <span>الخصم</span>
      <span id="discount"></span>
    </div>

    <div class="total-line">
      <span>الإجمالي</span>
      <span id="total"></span>
    </div>

    <div>
      <span>المدفوع</span>
      <span id="paid"></span>
    </div>

    <div class="remaining">
      <span>الباقي</span>
      <span id="remaining"></span>
    </div>
  </div>
</div>
<div class="print-footer">
  All rights reserved to © qasim.fu 2026
</div>
</div>

<script>
  async function getInvoiceByPublicToken(token) {
    const url =
`${window.SUPABASE_URL}/rest/v1/invoices?select=*&public_token=eq.${token}`;

    const response = await fetch(url, {
      headers: {
        apikey: window.SUPABASE_ANON_KEY,
        Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`
      }
    });

    const result = await response.json();

    if (!response.ok) {
      console.error(result);
      return null;
    }

    return result[0] || null;
  }

  function renderInvoice(data) {
    const logo = document.getElementById('logo');

    if (data.logo) {
      logo.src = data.logo;
    } else {
      logo.style.display = 'none';
    }

    document.getElementById('storeName').textContent = data.store;
    document.getElementById('storeAddress').textContent = data.address || '';

    document.getElementById('invoiceNo').textContent = data.invoiceNo;
    document.getElementById('date').textContent = data.date;
    document.getElementById('client').textContent = data.client;
    document.getElementById('payment').textContent = data.payment;

    document.getElementById('subtotal').textContent = data.subtotal + ' دينار   ';
    document.getElementById('discount').textContent = data.discount + ' دينار   ';
    document.getElementById('total').textContent = data.total + ' دينار   ';
    document.getElementById('paid').textContent = data.paid + ' دينار   ';
    document.getElementById('remaining').textContent = data.remaining + ' دينار   ';

    document.getElementById('items').innerHTML = (data.items || []).map(function (i) {
      return `
        <tr>
          <td>${i.name}</td>
          <td>${i.qty} KG</td>
          <td>${Number(i.price).toFixed(2)} دينار   </td>
          <td>${(i.price * i.qty).toFixed(2)} دينار   </td>
        </tr>
      `;
    }).join('');
  }

  async function initPrintPage() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (token) {
      const invoice = await getInvoiceByPublicToken(token);

      if (!invoice) {
        document.body.innerHTML = 'لم يتم العثور على الفاتورة';
        return;
      }

      const invoiceData = invoice.data || {};
      const profile = invoice.profiles || {};

      renderInvoice({
        logo: profile.logo_url || 'logo.png',
        store: profile.store_name || '',
        address: profile.store_address || '',
        invoiceNo: invoice.invoice_no || '',
        date: invoiceData.date || '',
        client: invoice.client_name || '',
        payment: invoiceData.payment || '',
        subtotal: invoiceData.subtotal || '0.00',
        discount: invoiceData.discount || '0.00',
        total: invoiceData.total || invoice.total || '0.00',
        paid: invoiceData.paid || '0.00',
        remaining: invoiceData.remaining || '0.00',
        items: invoiceData.items || []
      });

      return;
    }

    const data = JSON.parse(localStorage.getItem('printData') || 'null');

    if (!data) {
      document.body.innerHTML = 'لا توجد بيانات للطباعة';
      return;
    }

    renderInvoice(data);

    window.addEventListener('load', function () {
      setTimeout(function () {
        window.print();
      }, 300);
    });
  }

  initPrintPage();
</script>


</body>
</html>
